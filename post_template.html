<body class="wp-singular post-template-default single single-post wp-custom-logo wp-embed-responsive wp-theme-generatepress right-sidebar nav-below-header separate-containers nav-search-enabled header-aligned-left dropdown-hover elementor-default elementor-kit-2321 elementor-page" itemtype="https://schema.org/Blog" itemscope>

    <!-- Site Header -->
    <header class="site-header" id="masthead" aria-label="Site" itemtype="https://schema.org/WPHeader" itemscope>
        <div class="inside-header grid-container">
            <div class="site-logo">
                <a href="https://jimmy77733.github.io/knowledgesharehub/" rel="home">
                    <img alt="K.S.H" src="https://jimmy77733.github.io/knowledgesharehub/wp-content/uploads/2021/07/cropped-cropped-cropped-cropped-imageedit_16_5740140443-1.png" width="1700" height="340">
                </a>
            </div>
        </div>
    </header>

    <!-- Main Navigation（直接沿用現有 HTML 結構） -->
    <!-- 注意：這段可以視需要從現有頁面完整貼上，以保持 100% 一致 -->
    <!-- 這裡略去具體選單項目，建議後續如需完全同步，可從任一單篇文章 HTML 複製整段 nav.main-navigation -->

    <!-- 版型容器 -->
    <div class="site grid-container container hfeed" id="page">
        <div class="site-content" id="content">
            <div class="content-area" id="primary">
                <main class="site-main" id="main">

                    <!-- 單篇文章骨架 -->
                    <article class="post type-post status-publish format-standard has-post-thumbnail hentry" itemtype="https://schema.org/CreativeWork" itemscope>
                        <div class="inside-article">

                            <header class="entry-header">
                                <h1 class="entry-title" itemprop="headline">{{TITLE}}</h1>
                                <div class="entry-meta">
                                    <span class="posted-on">
                                        <time class="entry-date published" datetime="{{DATE}}" itemprop="datePublished">{{DATE}}</time>
                                    </span>
                                </div>
                            </header>

                            <div class="entry-content" itemprop="text">
                                <!-- Elementor 內容容器，{{CONTENT}} 將被置入這裡 -->
                                <div data-elementor-type="wp-post" class="elementor elementor-0000">
                                    {{CONTENT}}
                                </div>
                            </div>

                        </div>
                    </article>

                </main>
            </div>

            <!-- 右側側欄可以視需要靜態複製；此處簡化為空容器 -->
            <div class="widget-area sidebar is-right-sidebar" id="right-sidebar">
                <div class="inside-right-sidebar">
                </div>
            </div>

        </div>
    </div>

    <!-- Footer（結構照現有站） -->
    <div class="site-footer footer-bar-active footer-bar-align-center">
        <footer class="site-info" aria-label="Site" itemtype="https://schema.org/WPFooter" itemscope>
            <div class="inside-site-info">
                <div class="footer-bar">
                    <!-- 可直接從既有頁面複製 footer 小工具 -->
                </div>
                <div class="copyright-bar">
                    <span class="copyright">© 2026 K.S.H</span> • 網站設計採用 <a href="https://generatepress.com/" itemprop="url">GeneratePress</a>
                </div>
            </div>
        </footer>
    </div>
